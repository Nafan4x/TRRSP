name: CI-Pipeline

on:
  push:
    branches: main
  pull_request:
    branches: main

jobs:
  Build:
    runs-on: ubuntu-latest

    steps:
      - name: Clone repo
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y make

      - name: Building program
        run: make all
        working-directory: ./src

      - name: Upload binaries to artifact
        uses: actions/upload-artifact@v4
        with:
          name: matrix-artifact
          path: src/matrix
          retention-days: 1

  Test:
    needs: Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: matrix-artifact
          path: ./src

      - run: chmod +x ./src/matrix

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y make

      - name: Make tests executable
        run: chmod +x run_tests.sh test2.sh
        working-directory: ./cicd

      - name: Run tests
        run: ./run_tests.sh
        working-directory: ./cicd

  Package:
    needs: Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: matrix-artifact
          path: ./usr/local/bin

      - name: Build deb-package
        run: |
          # Создаем структуру deb пакета если её нет
          mkdir -p DEBIAN
          
          # Проверяем что control файл существует
          if [ ! -f DEBIAN/control ]; then
            echo "Error: DEBIAN/control not found!"
            exit 1
          fi
          
          # Собираем пакет
          dpkg-deb --build . matrix.deb

      - name: Upload deb package
        uses: actions/upload-artifact@v4
        with:
          name: deb-package
          path: "matrix.deb"
          retention-days: 1name: CI Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.21'
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y make
    
    - name: Build program
      run: |
        cd src
        make all
    
    - name: Run tests
      run: |
        cd cicd
        chmod +x run_tests.sh test2.sh
        ./run_tests.sh
    
    - name: Build deb package
      run: |
        # Создаем структуру deb пакета
        mkdir -p matrix-1.0/DEBIAN
        mkdir -p matrix-1.0/usr/local/bin
        
        # Копируем бинарник
        cp src/matrix matrix-1.0/usr/local/bin/
        
        # Копируем control файл
        cp DEBIAN/control matrix-1.0/DEBIAN/
        
        # Собираем deb пакет
        dpkg-deb --build matrix-1.0
        
        # Создаем папку для артефактов
        mkdir -p artifacts
        mv matrix-1.0.deb artifacts/matrix-app_amd64.deb
    
    - name: Upload artifacts
      uses: actions/upload-artifact@v3
      with:
        name: deb-package
        path: artifacts/
