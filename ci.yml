name: CI Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.21'
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y make
    
    - name: Build program
      run: |
        cd src
        make all
    
    - name: Run tests
      run: |
        cd cicd
        chmod +x run_tests.sh test2.sh
        ./run_tests.sh
    
    - name: Build deb package
      run: |
        # Создаем структуру deb пакета
        mkdir -p matrix-1.0/DEBIAN
        mkdir -p matrix-1.0/usr/local/bin
        
        # Копируем бинарник
        cp src/matrix matrix-1.0/usr/local/bin/
        
        # Копируем control файл
        cp DEBIAN/control matrix-1.0/DEBIAN/
        
        # Собираем deb пакет
        dpkg-deb --build matrix-1.0
        
        # Создаем папку для артефактов
        mkdir -p artifacts
        mv matrix-1.0.deb artifacts/matrix-app_amd64.deb
    
    - name: Upload artifacts
      uses: actions/upload-artifact@v3
      with:
        name: deb-package
        path: artifacts/
